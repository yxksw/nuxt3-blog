name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["main", "master", "blog"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run when TARGET_BRANCH is unset, or the current branch matches it.
    # When this condition is false the job is *skipped* (not failed), so no
    # failure notification is sent.
    if: ${{ vars.TARGET_BRANCH == '' || github.ref == format('refs/heads/{0}', vars.TARGET_BRANCH) }}
    env:
      # Base URL for the deployed site.
      # Use "/" for a user/organization site or a site served from the domain root.
      # Change this to "/<repo-name>/" when deploying a project site under a subpath,
      # e.g. https://<user>.github.io/<repo-name>/
      NUXT_APP_BASE_URL: /
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Disable Jekyll
        run: touch .output/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
